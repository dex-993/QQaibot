# =============================================================================
# aibot — NoneBot2 + NapCat（OneBot v11）大模型配置（示例）
# -----------------------------------------------------------------------------
# 使用：复制本文件为 llm_config.ini 后修改；勿将含真实 token/QQ 的 llm_config.ini 提交仓库。
# 路径：默认项目根目录下的 llm_config.ini；可用环境变量 LLM_CONFIG_INI 覆盖。
# 编码：UTF-8。修改后多数项会随请求重新读取；「人设记忆」在 bot 启动时载入一次。
# =============================================================================

[llm]
# --- 后端选择 ---
# openclaw：HTTP 请求本机 OpenClaw Gateway 的 /v1/responses（OpenResponses）。
# local：请求 OpenAI 兼容接口 /v1/chat/completions（如 LM Studio、Ollama 等）。
backend = local

# --- 多轮对话（内存，非持久化数据库）---
# 是否按 QQ 私聊 / 群内用户维度保留「用户↔助手」轮次；false 则每条消息独立一轮。
history_enable = true
# 最多保留多少对「用户 + 助手」；超出会从最早一轮裁剪。
history_max_rounds = 10
# 历史长度上限的粗估（按字符数÷4 近似 token）；与 max_rounds 同时生效，先触顶者为准。
history_max_tokens = 4000
# 某会话连续多少秒无新消息则清空该会话桶；0 表示仅按轮数/ token 限制裁剪，不按时间清空。
history_ttl_seconds = 1800

# --- 管理指令 ---
# 私聊发送「/清空全部记忆」时，仅此处列出的 QQ 可清空「所有人/所有群」的多轮桶；留空则关闭该指令（防误触）。
# 多个 QQ 用英文逗号分隔，也支持中文逗号。
memory_clear_master_qq =

# --- 本地模型专用：工作区「人设记忆」---
# 仅当 backend=local 且为 true/1/yes/on 时生效：在 bot 启动时读取工作区根目录下的 soul.md、agent.md，
# 拼入本地请求的 system（不读取 USER.md）。backend=openclaw 时此项不会注入 Gateway。
# 与 openclaw_workspace_memory 二选一；若两项都写，以「龙虾记忆」为准。
龙虾记忆 = true

# 人设/工作区根目录。留空时顺序为：项目内「人设」目录 → 用户目录下 ~/.openclaw/workspace（若存在）。
# 可填绝对路径指向其它 OpenClaw 工作区副本；须为已存在的目录。
openclaw_workspace_path =
# 上述 Markdown 正文总字符上限（默认约 32000）；超出会截断并标注，避免撑爆上下文。
openclaw_workspace_max_chars = 32000

# --- 群聊：空 @ 回复 ---
# 群内仅 @ 机器人、无正文、无图、无引用时，随机从中选一条发送。多项用英文逗号分隔；
# 单条文案内不要使用英文逗号，否则会被拆成多条。
group_empty_at_replies = 光叫我又不说话——想聊啥打出来嘛，我等着呢🦞,嗯？叫我又不吭声——卡壳了还是害羞？补一句就行。,戳我一下又不说话，那我先去潜水了，有正文再 @。,在听。不过你只 @ 不说话，我可猜不到你要干啥呀。,行，人到了话没到——想好打啥再叫我，别让我干瞪眼🦞

[openclaw]
# Gateway 根地址，形如 http://127.0.0.1:18790；不要带 /v1 或 /v1/responses（程序会规范化，误贴后缀可能导致 404/502）。
base_url = http://127.0.0.1:18790
# 与 Gateway 认证一致（如部署时的 OPENCLAW_GATEWAY_TOKEN）；勿泄露。
token = YOUR_OPENCLAW_GATEWAY_TOKEN
# 子智能体 id；若填写则优先于 agent_id，用于 x-openclaw-agent-id 与 model 解析。
subagent_id =
# 未配置 subagent_id 时使用；二者至少填其一，否则 OpenClaw 请求无法解析智能体。
agent_id = main
# OpenResponses 的 model 字段：可留空等价于 openclaw；或 openclaw/<agentId>（斜杠）。不要使用 openclaw:xxx 冒号写法。
model =
# 网关侧是否声明支持视觉；当前 OpenClaw 路径实现上仍按文本处理输入（多模态仅取文字），默认 false 即可。
supports_vision = false
# HTTP 请求超时（秒）。
timeout_seconds = 120
# 随请求传入的 instructions（系统侧说明），会与会话一并提交。
instructions = 你是 QQ 聊天助手，回复简短自然。
# 仅 backend=openclaw 时生效：允许私聊走 Gateway 的 QQ 白名单（逗号分隔）。不在名单则私聊不请求、不回复；群聊不受此限制。
private_allow_qq =

[local]
# OpenAI 兼容 API 根地址；若未以 /v1 结尾，程序会自动补全为 .../v1。
base_url = http://127.0.0.1:1234/v1
# 多数本地服务不校验，可填占位（如 lm-studio）；以你的服务端要求为准。
api_key = lm-studio
# 与推理服务端注册的模型 id 一致。
model = qwen/qwen3.5-9b
# backend=local 时：是否把 QQ 图片以多模态消息发给模型；需模型本身支持视觉。
supports_vision = true
# 发图前将最长边压到不超过该像素（等比）；减轻 LM Studio 等因分辨率过大返回 400。未写默认 1280；0 表示不限制边长。
vision_max_long_edge = 1280
# 单张图转 JPEG 后的字节上限；超限会继续缩小/降质量。0 表示不限制字节（仍可能受 vision_max_long_edge 约束，除非其为 0）。
vision_max_image_bytes = 1048576
# JPEG 质量 1–100。
vision_jpeg_quality = 85
# 单次请求超时（秒）。
timeout_seconds = 120
# 本地 chat 的 system 人设；若启用「龙虾记忆」，会在其后附加 soul.md/agent.md 摘要及多模态回复约定。
system_prompt = 你是 QQ 聊天助手，回复简短自然。

[tts]
# 是否启用 TTS 语音回复（LLM 回复转语音）；false 则只发文字。
enabled = true
# Qwen3-TTS Base 模型本地路径（必填）。
model_path = models/Qwen3-TTS-12Hz-1.7B-Base
# Qwen3-TTS-Tokenizer-12Hz 路径（若与 model_path 同目录可不填）。
tokenizer_path =
# 语音克隆用参考音频路径（支持 .wav/.mp3，支持 URL 或 base64）。留空则用默认音色。
ref_audio =
# ref_audio 对应的文字（必填，否则无法克隆）。
ref_text = 大家好呀！今天天气真不错，我要给大家介绍一个超厉害的新技术，快来听听吧！
# 生成语音的语种；留空自动检测。有效值：Chinese, English 等（见 Qwen3-TTS 文档）。
language = Chinese
# 语音最大时长（秒）；超出则降级为文字发送。QQ 单条语音上限为 60 秒。
max_duration_seconds = 60
# 是否优先发语音（true=尽量发语音，超时改文字；false=只发文字）。
prefer_voice = true

[llm]
# backend：openclaw（Gateway /v1/responses）或 local（OpenAI 兼容 /v1/chat/completions）
backend = local
history_enable = true
history_max_rounds = 10
history_max_tokens = 4000
history_ttl_seconds = 1800
memory_clear_master_qq = 545527602,391108453
# 仅 backend=local：启动时读 OpenClaw 工作区 Markdown 并入 system（排除 USER.md）
龙虾记忆 = true
# 留空：优先使用项目内「人设」目录；也可填绝对路径指向其它工作区
openclaw_workspace_path =
openclaw_workspace_max_chars = 32000
# 群聊仅 @、无字、无图、无引用时随机选一条发（英文逗号分隔；勿在句内使用英文逗号）
group_empty_at_replies = 光叫我又不说话——想聊啥打出来嘛，我等着呢🦞,嗯？叫我又不吭声——卡壳了还是害羞？补一句就行。,戳我一下又不说话，那我先去潜水了，有正文再 @。,在听。不过你只 @ 不说话，我可猜不到你要干啥呀。,行，人到了话没到——想好打啥再叫我，别让我干瞪眼🦞

[openclaw]
base_url = http://127.0.0.1:18790
token = Tff2NVXtGLccmp9n_Zu4IgoGTc0181RQ
subagent_id =
agent_id = main
model =
# 网关侧模型是否支持视觉（图片）；未接传图前仅作预留，默认 false
supports_vision = false
timeout_seconds = 120
instructions = 你是 QQ 聊天助手，回复简短自然。
private_allow_qq = 545527602,391108453

[local]
base_url = http://127.0.0.1:1234/v1
api_key = lm-studio
model = qwen/qwen3.5-9b
# 当前所用模型是否支持多模态（图片）输入；未接传图逻辑前仅作开关预留，默认 false
supports_vision = true
# 转 JPEG 前最长边像素上限；过大易触发 LM Studio/视觉后端 400（与文件体积无关）。填 0 不限制
vision_max_long_edge = 1280
# 单张图转 JPEG 后的最大字节数；超出则继续缩小分辨率/降质量。填 0 表示不限制字节（仍受上面边长约束）
vision_max_image_bytes = 1048576
# JPEG 质量 1–100
vision_jpeg_quality = 85
timeout_seconds = 120
system_prompt = 你是 QQ 聊天助手，回复简短自然。
